  </div>

  <div id="member-page" style="display:none;"></div>

</div>

<script>

const DOMAIN = 'https://dekt.cybozu.com';

const API_TOKEN = 'kRuyhs6vF5Z9cQPzBg2LyDQXhYPdGFs3nVLhaLGH';

const MEMBER_APP = 178;

const MATCH_APP = 170;

function normalizePhone(value){
  return String(value || '').replace(/\D/g,'');
}

}

    }
  });

  if(!resp.ok){

async function verifyMember(phone){

  const query =
    encodeURIComponent(
      `手機號碼 = "${phone}" and 是否有效 = "Y"`
    );

  const url =
    `${DOMAIN}/k/v1/records.json?app=${MEMBER_APP}&query=${query}`;

  const data = await kintoneGet(url);

  return data.records?.[0] || null;
}

async function getMatches(){

  const url =
    `${DOMAIN}/k/v1/records.json?app=${MATCH_APP}&query=${encodeURIComponent('limit 500')}`;

  const data = await kintoneGet(url);

  return data.records || [];
}

function renderMemberPage(name,phone){

  document.getElementById('login-page').style.display='none';

  const page =
    document.getElementById('member-page');

  page.style.display='block';

  page.innerHTML = `

    <div class="card">

      <div class="title">
        ${name} 您好 👋
      </div>

      <div class="info">
        📱 ${phone}
      </div>

      <div class="info">
        🎾 歡迎回到網球聯盟
      </div>

      <button
        class="btn logout-btn"
        id="logout-btn">
        登出
      </button>

    </div>

    <div class="card">

      <div class="title">
        🌐 全聯盟排名 TOP8
      </div>

      <table class="table">

        <thead>
          <tr>
            <th>排名</th>
            <th>姓名</th>
            <th>積分</th>
          </tr>
        </thead>

        <tbody id="ranking-body">
        </tbody>

      </table>

    </div>

  `;

  document.getElementById('logout-btn')
    .onclick = function(){

      localStorage.removeItem('member_phone');
      localStorage.removeItem('member_name');

      location.reload();
    };

  loadRanking();
}

async function loadRanking(){

  const matches = await getMatches();

  const map = {};

  matches.forEach(function(r){

    const fields = [

      {
        phone:'手機號碼_驗證用_A_參賽者1',
        name:'參賽者姓名_A_參賽者1',
        score:'本場積分_A_參賽者1'
      },

      {
        phone:'手機號碼_驗證用_A_參賽者2',
        name:'參賽者姓名_A_參賽者2',
        score:'本場積分_A_參賽者2'
      },

      {
        phone:'手機號碼_驗證用_B_參賽者1',
        name:'參賽者姓名_B_參賽者1',
        score:'本場積分_B_參賽者1'
      },

      {
        phone:'手機號碼_驗證用_B_參賽者2',
        name:'參賽者姓名_B_參賽者2',
        score:'本場積分_B_參賽者2'
      }

    ];

    fields.forEach(function(f){

      const name =
        r[f.name]?.value || '';

      const score =
        Number(r[f.score]?.value || 0);

      if(!name) return;

      if(!map[name]){

        map[name]={
          name:name,
          total:0
        };
      }

      map[name].total += score;

    });

  });

  const ranking =
    Object.values(map)
      .sort((a,b)=>b.total-a.total)
      .slice(0,8);

  document.getElementById('ranking-body')
    .innerHTML =
      ranking.map(function(r,index){

        return `
          <tr class="${index===0?'rank1':''}">
            <td>${index+1}</td>
            <td>${r.name}</td>
            <td>${r.total}</td>
          </tr>
        `;
      }).join('');
}
async function openCreateMatch(){

  const matchDate = prompt(
    '請輸入比賽日期時間\n例如：2026-05-20 19:00'
  );

  if(!matchDate) return;

  const location = prompt('請輸入比賽場地');

  if(!location) return;

  const a1Phone = prompt('A隊參賽者1手機');

  if(!a1Phone) return;

  const a2Phone = prompt('A隊參賽者2手機');

  if(!a2Phone) return;

  const b1Phone = prompt('B隊參賽者1手機');

  if(!b1Phone) return;

  const b2Phone = prompt('B隊參賽者2手機');

  if(!b2Phone) return;

  try{

    const response = await fetch(
      '/.netlify/functions/create-match',
      {
        method:'POST',
        headers:{
          'Content-Type':'application/json'
        },
        body:JSON.stringify({

          matchDate,
          location,

          status:'未開打',

          scoreA:'',
          scoreB:'',

          a1Phone,
          a2Phone,
          b1Phone,
          b2Phone

        })
      }
    );

    const data = await response.json();

    console.log(data);

    if(data.success){

      alert('✅ 比賽建立成功');

    }else{

      alert(
        '❌ 建立失敗\n' +
        JSON.stringify(data)
      );

    }

  }catch(e){

    console.error(e);

    alert('❌ create-match function 錯誤');

  }

}
document.getElementById('login-btn')

    const phone =
      normalizePhone(
        document.getElementById('phone-input').value
      );

    if(!phone){

      alert('請輸入手機號碼');
      return;
    }

    let member = null;

try{

  member = await verifyMember(phone);

}catch(e){

  console.log(e);

  alert('API連線失敗');

  return;
}

    if(!member){

      alert('驗證失敗');
      return;
    }

    const name =
      member['參賽者姓名'].value;

    localStorage.setItem(
      'member_phone',
      phone
    );

    localStorage.setItem(
      'member_name',
      name
    );

    renderMemberPage(name,phone);

  };

window.onload = function(){

  const phone =
    localStorage.getItem('member_phone');

  const name =
    localStorage.getItem('member_name');

  if(phone && name){

    renderMemberPage(name,phone);
  }

};

</script>
