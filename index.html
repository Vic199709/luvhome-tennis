<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>網球聯盟會員入口</title>

<style>

body{
  margin:0;
  background:#f5f7fb;
  font-family:"Microsoft JhengHei";
  color:#222;
}

.container{
  max-width:480px;
  margin:auto;
  padding:24px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.title{
  font-size:30px;
  font-weight:800;
  margin-bottom:18px;
}

.input{
  width:100%;
  box-sizing:border-box;
  padding:18px;
  border-radius:14px;
  border:1px solid #d7dce5;
  font-size:18px;
}

.btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:18px;
  margin-top:14px;
  color:#fff;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

.blue-btn{
  background:#2f73da;
}

.red-btn{
  background:#f25555;
}

.green-btn{
  background:#1c9c42;
}

.dark-btn{
  background:#394d5b;
}

.purple-btn{
  background:#6d46d9;
}

.section-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:14px;
}

.info{
  margin-bottom:14px;
  font-size:17px;
}

.match-box{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.small-card{
  background:#f7f7f7;
  border-radius:16px;
  padding:18px;
  text-align:center;
}

.big{
  font-size:28px;
  font-weight:800;
  margin-top:10px;
}

.team-green{
  background:#edf9f1;
  border:1px solid #93d9a7;
}

.team-orange{
  background:#fff7ed;
  border:1px solid #f5b466;
}

.line-green{
  border-bottom:3px solid #13a03d;
  padding-bottom:10px;
  margin-bottom:16px;
}

.line-orange{
  border-bottom:3px solid #ff7a00;
  padding-bottom:10px;
  margin-bottom:16px;
}

.team-name{
  text-align:center;
  font-size:28px;
  font-weight:800;
  color:#13873d;
  margin-bottom:16px;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:18px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  overflow:hidden;
  border-radius:14px;
}

th,td{
  border:1px solid #ececec;
  padding:12px;
  text-align:center;
}

th{
  background:#fafafa;
}

.top1{
  background:#fff6d9;
}

.top2{
  background:#f2f2f2;
}

.top3{
  background:#ffe9d6;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  width:92%;
  max-width:680px;
  background:#fff;
  border-radius:24px;
  padding:24px;
}

.modal-title{
  font-size:34px;
  font-weight:800;
  margin-bottom:24px;
}

.field{
  margin-bottom:16px;
}

.label{
  margin-bottom:8px;
  font-weight:700;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.member-box{
  background:#f7f9fc;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
  font-size:15px;
  line-height:1.8;
}

.error{
  color:#d60000;
  font-weight:700;
  margin-top:12px;
}

.success{
  color:#0f8b35;
  font-weight:700;
  margin-top:12px;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<div class="container">

  <div class="card" id="login-card">

    <div class="title">
      🎾 網球聯盟會員登入
    </div>

    <input
      class="input"
      id="phone-input"
      placeholder="請輸入手機號碼"
    >

    <button
      class="btn blue-btn"
      id="login-btn"
    >
      會員驗證登入
    </button>

  </div>

  <div id="member-home"></div>

</div>

<!-- 建立比賽視窗 -->

<div class="modal" id="create-match-modal">

  <div class="modal-content">

    <div class="modal-title">
      🎾 建立比賽
    </div>

    <div class="row">

      <div class="field">
        <div class="label">比賽日期時間</div>

        <input
          type="datetime-local"
          class="input"
          id="match-date"
        >
      </div>

      <div class="field">
        <div class="label">比賽場地</div>

        <input
          class="input"
          id="match-location"
          placeholder="例如：錦和網球場"
        >
      </div>

    </div>

    <div class="row">

      <div class="field">
        <div class="label">A隊參賽者1手機</div>

        <input
          class="input"
          id="a1-phone"
        >

        <div class="member-box hidden" id="a1-info"></div>
      </div>

      <div class="field">
        <div class="label">A隊參賽者2手機</div>

        <input
          class="input"
          id="a2-phone"
        >

        <div class="member-box hidden" id="a2-info"></div>
      </div>

    </div>

    <div class="row">

      <div class="field">
        <div class="label">B隊參賽者1手機</div>

        <input
          class="input"
          id="b1-phone"
        >

        <div class="member-box hidden" id="b1-info"></div>
      </div>

      <div class="field">
        <div class="label">B隊參賽者2手機</div>

        <input
          class="input"
          id="b2-phone"
        >

        <div class="member-box hidden" id="b2-info"></div>
      </div>

    </div>

    <div
      class="error hidden"
      id="age-error"
    ></div>

    <div
      class="success hidden"
      id="create-success"
    >
      ✅ 建立成功
    </div>

    <button
      class="btn green-btn"
      onclick="submitCreateMatch()"
    >
      建立比賽
    </button>

    <button
      class="btn red-btn"
      onclick="closeCreateMatch()"
    >
      取消
    </button>

  </div>

</div>

<script>

const API_BASE =
  '/.netlify/functions';

function normalizePhone(phone){

  return String(phone || '')
    .replace(/-/g,'')
    .trim();

}

async function verifyMember(phone){

  const response = await fetch(
    API_BASE +
    '/login?phone=' +
    encodeURIComponent(phone)
  );

  const data = await response.json();

  if(!data.success){
    return null;
  }

  return data.member;

}

function renderMemberHome(member){

  document.getElementById(
    'login-card'
  ).style.display='none';

  document.getElementById(
    'member-home'
  ).innerHTML = `

    <div class="card">

      <div class="title">
        ${member.name} 您好 👋
      </div>

      <div class="info">
        📱 ${member.phone}
      </div>

      <div class="info">
        🎾 登錄球隊：
        ${member.teams.join('、')}
      </div>

      <div class="actions">

        <button
          class="btn dark-btn"
          onclick="openCreateMatch()"
        >
          🎾 建立比賽
        </button>

        <button
          class="btn red-btn"
          onclick="logout()"
        >
          登出
        </button>

      </div>

    </div>

  `;

}

function logout(){

  location.reload();

}

function openCreateMatch(){

  document.getElementById(
    'create-match-modal'
  ).style.display='flex';

}

function closeCreateMatch(){

  document.getElementById(
    'create-match-modal'
  ).style.display='none';

}

async function loadMemberInfo(
  inputId,
  boxId
){

  const phone =
    normalizePhone(
      document.getElementById(inputId).value
    );

  if(!phone){
    return null;
  }

  const member =
    await verifyMember(phone);

  const box =
    document.getElementById(boxId);

  if(!member){

    box.classList.remove('hidden');

    box.innerHTML =
      '❌ 找不到會員';

    return null;

  }

  box.classList.remove('hidden');

  box.innerHTML = `
    👤 ${member.name}<br>
    🎂 ${member.age}歲<br>
    🎾 ${member.teams.join('、')}
  `;

  return member;

}

async function submitCreateMatch(){

  const ageError =
    document.getElementById('age-error');

  ageError.classList.add('hidden');

  const a1 =
    await loadMemberInfo(
      'a1-phone',
      'a1-info'
    );

  const a2 =
    await loadMemberInfo(
      'a2-phone',
      'a2-info'
    );

  const b1 =
    await loadMemberInfo(
      'b1-phone',
      'b1-info'
    );

  const b2 =
    await loadMemberInfo(
      'b2-phone',
      'b2-info'
    );

  if(!a1 || !a2 || !b1 || !b2){

    ageError.classList.remove('hidden');

    ageError.innerHTML =
      '❌ 有參賽者不存在';

    return;

  }

  const aAge =
    Number(a1.age || 0) +
    Number(a2.age || 0);

  const bAge =
    Number(b1.age || 0) +
    Number(b2.age || 0);

  if(aAge < 100){

    ageError.classList.remove('hidden');

    ageError.innerHTML =
      '❌ A隊年齡總和不足100';

    return;

  }

  if(bAge < 100){

    ageError.classList.remove('hidden');

    ageError.innerHTML =
      '❌ B隊年齡總和不足100';

    return;

  }

  const response = await fetch(

    API_BASE + '/create-match',

    {

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body:JSON.stringify({

        matchDate:
          document.getElementById(
            'match-date'
          ).value,

        location:
          document.getElementById(
            'match-location'
          ).value,

        status:'未開打',

        scoreA:'',
        scoreB:'',

        a1Phone:
          normalizePhone(
            document.getElementById(
              'a1-phone'
            ).value
          ),

        a2Phone:
          normalizePhone(
            document.getElementById(
              'a2-phone'
            ).value
          ),

        b1Phone:
          normalizePhone(
            document.getElementById(
              'b1-phone'
            ).value
          ),

        b2Phone:
          normalizePhone(
            document.getElementById(
              'b2-phone'
            ).value
          )

      })

    }

  );

  const data =
    await response.json();

  if(data.success){

    document
      .getElementById(
        'create-success'
      )
      .classList.remove('hidden');

  }else{

    ageError.classList.remove('hidden');

    ageError.innerHTML =
      '❌ ' +
      (data.message || '建立失敗');

  }

}

document.getElementById(
  'login-btn'
).onclick = async function(){

  const phone =
    normalizePhone(
      document.getElementById(
        'phone-input'
      ).value
    );

  if(!phone){

    alert('請輸入手機號碼');

    return;

  }

  const member =
    await verifyMember(phone);

  if(!member){

    alert('查無會員');

    return;

  }

  renderMemberHome(member);

};

</script>

</body>
</html>
