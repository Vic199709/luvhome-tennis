<!-- 🔥 聯盟賽程系統 START -->
<!-- 放在 </script> 前面 -->
<!-- ========================= -->

<script>

function getTeamName(record, side){
  const field = side === 'A'
    ? '代表球隊_A_參賽者1'
    : '代表球隊_B_參賽者1';

  return getValue(record, field) || '-';
}

function buildScheduleSections(records){

  const upcoming = [];
  const live = [];
  const completed = [];

  records.forEach(function(record){

    const status = getValue(record, '比賽狀態');

    const item = {
      date: getValue(record, '比賽日期時間') || '-',
      place: getValue(record, '比賽場地') || '-',
      aTeam: getTeamName(record, 'A'),
      bTeam: getTeamName(record, 'B'),
      aScore: getValue(record, 'A隊比數') || '0',
      bScore: getValue(record, 'B隊比數') || '0',
      winner: getValue(record, '比賽勝負') || '-'
    };

    if(status === '未開打'){
      upcoming.push(item);
    }

    else if(status === '比賽中'){
      live.push(item);
    }

    else if(status === '已完成'){
      completed.push(item);
    }

  });

  upcoming.sort((a,b) => String(a.date).localeCompare(String(b.date)));
  live.sort((a,b) => String(b.date).localeCompare(String(a.date)));
  completed.sort((a,b) => String(b.date).localeCompare(String(a.date)));

  return {
    upcoming,
    live,
    completed
  };
}

function renderScheduleCards(data){

  const upcomingHtml = data.upcoming.slice(0,3).map(function(item){
    return `
      <div class="schedule-card upcoming-card">
        <div class="schedule-title">
          📅 即將開打
        </div>

        <div class="schedule-date">
          ${String(item.date).replace('T',' ').slice(0,16)}
        </div>

        <div class="schedule-match">
          ${item.aTeam}
          <span class="vs-text">VS</span>
          ${item.bTeam}
        </div>

        <div class="schedule-place">
          📍 ${item.place}
        </div>
      </div>
    `;
  }).join('');

  const liveHtml = data.live.slice(0,3).map(function(item){
    return `
      <div class="schedule-card live-card">
        <div class="schedule-title">
          🔴 LIVE 比分
        </div>

        <div class="live-score">
          ${item.aTeam}
          <span class="score-number">${item.aScore}</span>

          :
          
          <span class="score-number">${item.bScore}</span>
          ${item.bTeam}
        </div>

        <div class="live-status">
          目前進行中
        </div>
      </div>
    `;
  }).join('');

  const completedHtml = data.completed.slice(0,5).map(function(item){
    return `
      <div class="schedule-card completed-card">
        <div class="schedule-title">
          🏆 最新戰績
        </div>

        <div class="schedule-match">
          ${item.aTeam}
          <span class="score-number">${item.aScore}</span>

          :
          
          <span class="score-number">${item.bScore}</span>
          ${item.bTeam}
        </div>

        <div class="winner-text">
          ${item.winner}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="card">

      <div class="title">
        🏟️ 聯盟賽程資訊
      </div>

      ${upcomingHtml || ''}

      ${liveHtml || ''}

      ${completedHtml || ''}

    </div>
  `;
}

</script>

<style>

.schedule-card{
  border-radius:18px;
  padding:18px;
  margin-top:16px;
  color:white;
}

.upcoming-card{
  background:linear-gradient(135deg,#4aa3ff,#2563eb);
}

.live-card{
  background:linear-gradient(135deg,#ff4d4d,#d62828);
}

.completed-card{
  background:linear-gradient(135deg,#13b66b,#0c8a4e);
}

.schedule-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:14px;
}

.schedule-date{
  font-size:18px;
  font-weight:700;
  margin-bottom:12px;
}

.schedule-match{
  font-size:24px;
  font-weight:900;
  line-height:1.5;
}

.schedule-place{
  margin-top:14px;
  font-size:16px;
}

.live-score{
  font-size:32px;
  font-weight:900;
  text-align:center;
  margin-top:12px;
}

.score-number{
  font-size:38px;
  margin:0 6px;
}

.live-status{
  text-align:center;
  margin-top:14px;
  font-size:16px;
  font-weight:700;
}

.winner-text{
  margin-top:14px;
  font-size:18px;
  font-weight:800;
}

.vs-text{
  margin:0 8px;
  opacity:.85;
}

</style>
