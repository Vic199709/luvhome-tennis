<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>網球聯盟會員入口</title>

<style>

body{
  margin:0;
  background:#f5f7fb;
  font-family:"Microsoft JhengHei";
  color:#222;
}

.container{
  max-width:480px;
  margin:auto;
  padding:24px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:24px;
  margin-top:40px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.title{
  font-size:42px;
  font-weight:900;
  margin-bottom:24px;
}

input{
  width:100%;
  box-sizing:border-box;
  border:1px solid #d9dee8;
  border-radius:14px;
  padding:16px;
  font-size:20px;
  margin-bottom:16px;
}

button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:18px;
  font-size:24px;
  font-weight:800;
  cursor:pointer;
}

.primary{
  background:#2f73d9;
  color:#fff;
}

.green{
  background:#1fa542;
  color:#fff;
}

.red{
  background:#f25555;
  color:#fff;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

.modal-content{
  background:#fff;
  width:100%;
  max-width:680px;
  border-radius:24px;
  padding:28px;
}

.info-box{
  background:#f3f5f9;
  border-radius:14px;
  padding:14px;
  margin-top:-6px;
  margin-bottom:16px;
  font-size:18px;
  line-height:1.7;
}

.error{
  color:#e53935;
  font-weight:700;
  margin:12px 0;
}

</style>
</head>

<body>

<div class="container">

  <div class="card" id="login-card">

    <div class="title">🎾 網球聯盟會員登入</div>

    <input
      id="phone-input"
      placeholder="請輸入手機號碼"
    >

    <button
      class="primary"
      id="login-btn"
    >
      會員驗證登入
    </button>

  </div>

  <div
    class="card"
    id="member-home"
    style="display:none;"
  ></div>

</div>

<div
  class="modal"
  id="create-match-modal"
>

  <div class="modal-content">

    <div class="title">🎾 建立比賽</div>

    <div class="row">

      <div>
        <label>比賽日期時間</label>
        <input type="datetime-local">
      </div>

      <div>
        <label>比賽場地</label>
        <input placeholder="例如：錦和網球場">
      </div>

    </div>

    <div class="row">

      <div>
        <label>A隊參賽者1手機</label>
        <input id="a1-phone">
        <div class="info-box" id="a1-info"></div>
      </div>

      <div>
        <label>A隊參賽者2手機</label>
        <input id="a2-phone">
        <div class="info-box" id="a2-info"></div>
      </div>

    </div>

    <div class="row">

      <div>
        <label>B隊參賽者1手機</label>
        <input id="b1-phone">
        <div class="info-box" id="b1-info"></div>
      </div>

      <div>
        <label>B隊參賽者2手機</label>
        <input id="b2-phone">
        <div class="info-box" id="b2-info"></div>
      </div>

    </div>

    <div
      class="error"
      id="age-error"
    ></div>

    <button class="green">
      建立比賽
    </button>

    <br><br>

    <button
      class="red"
      onclick="closeCreateMatch()"
    >
      取消
    </button>

  </div>

</div>

<script>

let currentMember = null;

async function verifyMember(phone){

  try{

    const res =
      await fetch(
        '/.netlify/functions/login?phone=' +
        phone
      );

    const data =
      await res.json();

    if(data.success){
      return data.member;
    }

    return null;

  }catch(e){

    return null;

  }

}

async function getMemberInfo(phone){

  try{

    const res =
      await fetch(
        '/.netlify/functions/member-info?phone=' +
        phone
      );

    const data =
      await res.json();

    if(data.success){
      return data.member;
    }

    return null;

  }catch(e){

    return null;

  }

}

function renderMemberHome(member){

  currentMember = member;

  document.getElementById(
    'login-card'
  ).style.display = 'none';

  document.getElementById(
    'member-home'
  ).style.display = 'block';

  document.getElementById(
    'member-home'
  ).innerHTML = `

    <div style="font-size:52px;font-weight:900;">
      ${member.name} 您好 👋
    </div>

    <div style="margin-top:18px;font-size:24px;">
      📱 ${member.phone}
    </div>

    <div style="margin-top:18px;font-size:24px;">
      🎾 登錄球隊：
      ${member.teams.join('、')}
    </div>

    <div
      style="
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:16px;
        margin-top:32px;
      "
    >

      <button
        class="primary"
        onclick="openCreateMatch()"
      >
        🎾 建立比賽
      </button>

      <button
        class="red"
        onclick="location.reload()"
      >
        登出
      </button>

    </div>

  `;

}

async function loadMemberInfo(inputId,infoId){

  const phone =
    document.getElementById(inputId)
    .value
    .trim();

  if(!phone){

    document.getElementById(
      infoId
    ).innerHTML = '';

    return null;

  }

  const member =
    await getMemberInfo(phone);

  if(!member){

    document.getElementById(
      infoId
    ).innerHTML =
      '查無會員';

    return null;

  }

  document.getElementById(
    infoId
  ).innerHTML = `

    👤 ${member.name}<br>
    🎂 ${member.age}歲<br>
    🎾 ${member.teams.join('、')}

  `;

  validateAge();

  return member;

}

async function validateAge(){

  const ids = [
    'a1-phone',
    'a2-phone',
    'b1-phone',
    'b2-phone'
  ];

  let members = [];

  for(const id of ids){

    const phone =
      document.getElementById(id)?.value
      ?.trim();

    if(phone){

      const member =
        await getMemberInfo(phone);

      if(member){
        members.push(member);
      }

    }

  }

  const aAge =
    (parseInt(members[0]?.age)||0) +
    (parseInt(members[1]?.age)||0);

  const bAge =
    (parseInt(members[2]?.age)||0) +
    (parseInt(members[3]?.age)||0);

  let msg = '';

  if(aAge && aAge < 100){
    msg += '❌ A隊年齡總和不足100<br>';
  }

  if(bAge && bAge < 100){
    msg += '❌ B隊年齡總和不足100';
  }

  document.getElementById(
    'age-error'
  ).innerHTML = msg;

}

function openCreateMatch(){

  document.getElementById(
    'create-match-modal'
  ).style.display = 'flex';

  if(currentMember){

    document.getElementById(
      'a1-phone'
    ).value =
      currentMember.phone;

    loadMemberInfo(
      'a1-phone',
      'a1-info'
    );

  }

}

function closeCreateMatch(){

  document.getElementById(
    'create-match-modal'
  ).style.display = 'none';

}

[
  ['a1-phone','a1-info'],
  ['a2-phone','a2-info'],
  ['b1-phone','b1-info'],
  ['b2-phone','b2-info']
].forEach(arr=>{

  document.addEventListener(
    'input',
    async function(e){

      if(
        e.target.id === arr[0]
      ){

        await loadMemberInfo(
          arr[0],
          arr[1]
        );

      }

    }

  );

});

document.getElementById(
  'login-btn'
).onclick = async function(){

  const phone =
    document.getElementById(
      'phone-input'
    ).value.trim();

  if(!phone){

    alert('請輸入手機號碼');
    return;

  }

  const member =
    await verifyMember(phone);

  if(!member){

    alert('查無會員');
    return;

  }

  renderMemberHome(member);

};

</script>

</body>
</html>
