<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>網球聯盟會員入口</title>

<style>
body{
  margin:0;
  background:#f5f7fb;
  font-family:"Microsoft JhengHei";
  color:#222;
}

.container{
  max-width:480px;
  margin:auto;
  padding:24px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:24px;
  margin-bottom:20px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}

.title{
  font-size:32px;
  font-weight:700;
  margin-bottom:24px;
}

.input{
  width:100%;
  padding:16px;
  font-size:20px;
  border:1px solid #ddd;
  border-radius:12px;
  box-sizing:border-box;
  margin-bottom:18px;
}

.btn{
  width:100%;
  padding:18px;
  border:0;
  border-radius:14px;
  background:#1f73e0;
  color:#fff;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
}

.logout-btn{
  background:#ef5350;
  margin-top:12px;
}

.info{
  font-size:22px;
  margin-bottom:18px;
  line-height:1.8;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

.table th,
.table td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

.table th{
  background:#f4f4f4;
}

.rank1{
  background:#fff8d6;
}
</style>
</head>

<body>

<div class="container">

  <div id="login-page">
    <div class="card">
      <div class="title">🎾 網球聯盟會員登入</div>

      <input
        id="phone-input"
        class="input"
        placeholder="請輸入手機號碼"
      >

      <button id="login-btn" class="btn">
        會員驗證登入
      </button>
    </div>
  </div>

  <div id="member-page" style="display:none;"></div>

</div>

<script>
function normalizePhone(value){
  return String(value || '').replace(/\D/g,'');
}

async function verifyMember(phone){
  const resp = await fetch(
    `/.netlify/functions/login?phone=${encodeURIComponent(phone)}`
  );

  const data = await resp.json();

  if(!resp.ok){
    throw new Error(data.error || 'API連線失敗');
  }

  return data.records?.[0] || null;
}

function renderMemberPage(name, phone, team){
  document.getElementById('login-page').style.display = 'none';

  const page = document.getElementById('member-page');
  page.style.display = 'block';

  page.innerHTML = `
    <div class="card">
      <div class="title">${name} 您好 👋</div>

      <div class="info">📱 ${phone}</div>
      <div class="info">🎾 代表球隊：${team || '-'}</div>
      <div class="info">歡迎回到網球聯盟</div>

      <button class="btn logout-btn" id="logout-btn">
        登出
      </button>
    </div>
  `;

  document.getElementById('logout-btn').onclick = function(){
    localStorage.removeItem('member_phone');
    localStorage.removeItem('member_name');
    localStorage.removeItem('member_team');
    location.reload();
  };
}

document.getElementById('login-btn').onclick = async function(){
  const btn = document.getElementById('login-btn');

  const phone = normalizePhone(
    document.getElementById('phone-input').value
  );

  if(!phone){
    alert('請輸入手機號碼');
    return;
  }

  btn.disabled = true;
  btn.innerText = '驗證中...';

  try{
    const member = await verifyMember(phone);

    if(!member){
      alert('驗證失敗，查無會員資料');
      return;
    }

    const name = member['參賽者姓名']?.value || '';
    const team = member['代表球隊']?.value || '';

    localStorage.setItem('member_phone', phone);
    localStorage.setItem('member_name', name);
    localStorage.setItem('member_team', team);

    renderMemberPage(name, phone, team);

  }catch(e){
    console.error(e);
    alert('API連線失敗，請確認 Netlify Function 或 API Token');
  }finally{
    btn.disabled = false;
    btn.innerText = '會員驗證登入';
  }
};

window.onload = function(){
  const phone = localStorage.getItem('member_phone');
  const name = localStorage.getItem('member_name');
  const team = localStorage.getItem('member_team');

  if(phone && name){
    renderMemberPage(name, phone, team);
  }
};
</script>

</body>
</html>
